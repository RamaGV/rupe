<!-- src/app/core/ui/skeleton.html -->
<div class="animate-pulse" aria-hidden="true">
  @switch (tipo()) {
    @case ('tabla') {
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <div class="bg-gray-100 h-10"></div>
        @for (i of items; track i) {
          <div class="border-t border-gray-100 px-4 py-3 flex gap-4">
            <div class="h-4 bg-gray-200 rounded w-24"></div>
            <div class="h-4 bg-gray-200 rounded flex-1"></div>
            <div class="h-4 bg-gray-200 rounded w-32"></div>
            <div class="h-4 bg-gray-200 rounded w-16"></div>
          </div>
        }
      </div>
    }
    @case ('tarjetas') {
      <div class="grid gap-4 sm:grid-cols-3">
        @for (i of items; track i) {
          <div class="bg-white rounded-xl shadow p-6">
            <div class="h-8 bg-gray-200 rounded w-24 mb-3"></div>
            <div class="h-4 bg-gray-200 rounded w-36"></div>
          </div>
        }
      </div>
    }
    @case ('lineas') {
      <div class="bg-white rounded-xl shadow p-6 space-y-3">
        @for (i of items; track i) {
          <div class="h-4 bg-gray-200 rounded" [class.w-2/3]="i % 3 === 2"></div>
        }
      </div>
    }
  }
</div>
