<!-- src/app/features/glosario/glosario.html -->
<div class="p-4 sm:p-8 max-w-3xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-800 mb-1">Glosario de compras públicas</h1>
  <p class="text-sm text-gray-500 mb-6">Los términos que vas a ver en el boletín, sin jerga.</p>
  <div class="bg-white rounded-xl shadow divide-y divide-gray-100">
    @for (t of terminos; track t[0]) {
      <div class="p-4">
        <dt class="font-bold text-gray-800 text-sm">{{ t[0] }}</dt>
        <dd class="text-sm text-gray-600 mt-0.5">{{ t[1] }}</dd>
      </div>
    }
  </div>
</div>
