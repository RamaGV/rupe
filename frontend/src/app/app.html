<!-- src/app/app.html -->
<div class="min-h-screen bg-gray-50 flex flex-col">
  <nav class="bg-white/90 backdrop-blur border-b border-gray-200 px-4 sm:px-8 py-3 flex items-center justify-between flex-wrap gap-y-2 sticky top-0 z-10">
    <div class="flex items-center gap-3 sm:gap-6 flex-wrap">
      <a routerLink="/" class="font-bold text-gray-800 hover:text-blue-600">
        Boletín de Contrataciones
      </a>
      <a
        routerLink="/licitaciones"
        routerLinkActive="text-blue-600 font-medium"
        class="text-sm text-gray-600 hover:text-blue-600"
      >
        Licitaciones
      </a>
      <a
        routerLink="/proveedores"
        routerLinkActive="text-blue-600 font-medium"
        class="text-sm text-gray-600 hover:text-blue-600"
      >
        Proveedores
      </a>
      <a
        routerLink="/radar"
        routerLinkActive="text-blue-600 font-medium"
        class="text-sm text-gray-600 hover:text-blue-600"
      >
        Radar de precios
      </a>
      <a
        routerLink="/alertas"
        routerLinkActive="text-blue-600 font-medium"
        class="text-sm text-gray-600 hover:text-blue-600"
      >
        Alertas
      </a>
    </div>
    <div class="flex items-center gap-4">
      <button
        (click)="tema.alternar()"
        class="text-lg hover:opacity-70"
        [title]="tema.oscuro() ? 'Modo claro' : 'Modo oscuro'"
        [attr.aria-label]="tema.oscuro() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
      >
        {{ tema.oscuro() ? '☀️' : '🌙' }}
      </button>
      <a routerLink="/guardadas" class="text-lg hover:opacity-70" title="Guardadas" aria-label="Licitaciones guardadas">⭐</a>
      <a
        routerLink="/notificaciones"
        class="relative text-lg hover:opacity-70"
        title="Notificaciones"
        aria-label="Notificaciones"
      >
        🔔
        @if (sinLeer() > 0) {
          <span
            class="absolute -top-1 -right-2 bg-red-600 text-white text-[10px] font-bold rounded-full px-1.5 py-0.5 leading-none"
          >
            {{ sinLeer() }}
          </span>
        }
      </a>
      <span class="text-xs text-gray-500">Backend:</span>
      <span
        class="px-2 py-0.5 rounded-full text-xs font-medium"
        [class]="healthStatus() === 'ok'
          ? 'bg-green-100 text-green-700'
          : 'bg-red-100 text-red-700'"
      >
        {{ healthStatus() }}
      </span>
    </div>
  </nav>

  <main class="flex-1">
    <router-outlet />
  </main>

  <!-- Footer: siempre abajo (flex-col + mt-auto), firma del desarrollador -->
  <footer class="mt-auto border-t border-gray-200 bg-white px-4 sm:px-8 py-4">
    <div class="flex items-center justify-between flex-wrap gap-2 text-xs text-gray-500">
      <p>
        Boletín de Contrataciones del Estado · datos oficiales de
        <a href="https://www.gub.uy/agencia-reguladora-compras-estatales" target="_blank" rel="noopener" class="hover:underline">ARCE</a>
        · <a routerLink="/metodologia" class="hover:underline">Metodología</a>
        · <a routerLink="/glosario" class="hover:underline">Glosario</a>
      </p>
      <p class="flex items-center gap-3">
        <span>Web desarrollada por <span class="font-medium text-gray-600">Ramiro Vazquez</span></span>
        <a href="https://github.com/RamaGV" target="_blank" rel="noopener" class="text-blue-600 hover:underline">GitHub</a>
        <a href="mailto:funes.gvr@gmail.com?subject=Boletín de Contrataciones" class="text-blue-600 hover:underline">Contacto</a>
      </p>
    </div>
  </footer>
</div>
