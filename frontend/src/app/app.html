<!-- src/app/app.html -->
<main class="main">
  <div class="min-h-screen bg-gray-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-md p-10 flex flex-col items-center gap-4">
      <h1 class="text-3xl font-bold text-gray-800">
        Boletín de Contrataciones
      </h1>
      <p class="text-gray-500 text-sm">Estado Uruguayo</p>
      <div class="flex items-center gap-2 mt-4">
        <span class="text-sm text-gray-600">Backend:</span>
        <span
          class="px-3 py-1 rounded-full text-sm font-medium"
          [class]="healthStatus() === 'ok'
            ? 'bg-green-100 text-green-700'
            : 'bg-red-100 text-red-700'"
        >
          {{ healthStatus() }}
        </span>
      </div>
      <router-outlet />
    </div>
  </div>
</main>
