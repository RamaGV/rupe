# frontend/nginx.conf — dos responsabilidades:
#   1. SPA fallback: /licitaciones/123 no es un archivo — toda ruta
#      desconocida devuelve index.html y Angular resuelve el routing.
#   2. Proxy /api → backend: el navegador habla con UN solo origen
#      (adiós CORS en producción); "backend" es el nombre del servicio
#      en la red interna de docker-compose.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
